services:
  postgres:
    image: postgres:16-alpine
    container_name: taskflow-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskflow
    ports:
      - "5433:5432"   # 5432 est pris par PostgreSQL local (Homebrew)
    volumes:
      - taskflow_pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d   # migrations auto au premier démarrage
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  taskflow_pgdata:
